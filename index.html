<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICE OVER MASTER PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root { --bg-color: #121212; --panel-color: #1e1e1e; --accent-color: #ff8c00; --text-color: #e0e0e0; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 10px; }
        .player-container { background: var(--panel-color); border: 2px solid #333; border-radius: 12px; padding: 20px; width: 100%; max-width: 950px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .header { border-bottom: 2px solid var(--accent-color); padding-bottom: 10px; margin-bottom: 20px; text-align: center; font-weight: bold; color: var(--accent-color); font-size: 24px; text-transform: uppercase; }
        .drop-zone { border: 2px dashed #444; padding: 20px; text-align: center; border-radius: 8px; background: #161616; cursor: pointer; margin-bottom: 15px; }
        .vu-meter { height: 15px; background: #000; width: 100%; margin: 10px 0; border-radius: 10px; overflow: hidden; }
        .vu-fill { height: 100%; width: 0%; background: linear-gradient(to right, #00ff00, #ffff00, #ff0000); transition: 0.05s; }
        .grid-effects { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .effect-group { background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        label { display: block; font-size: 11px; color: var(--accent-color); font-weight: bold; margin-top: 8px; text-transform: uppercase; }
        .val { float: right; color: #00ff00; font-family: monospace; }
        input[type=range] { width: 100%; margin: 5px 0; accent-color: var(--accent-color); cursor: pointer; }
        select { width: 100%; background: #333; color: white; border: 1px solid #555; padding: 10px; border-radius: 5px; margin-top: 5px; cursor: pointer; font-weight: bold; }
        .action-btns { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-top: 20px; }
        button { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.2s; background: #444; color: white; text-transform: uppercase; }
        button:hover { background: var(--accent-color); color: black; }
        canvas { width: 100%; height: 60px; background: #000; border-radius: 5px; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">🎙️ VOICE OVER MASTER PRO</div>
    <div class="drop-zone" onclick="document.getElementById('audioUpload').click()">
        <b>ÎNCARCĂ FIȘIERUL AUDIO (CLICK SAU DRAG)</b>
        <input type="file" id="audioUpload" accept="audio/*" style="display:none">
    </div>
    <canvas id="waveform"></canvas>
    <div class="vu-meter"><div id="vuFill" class="vu-fill"></div></div>

    <div class="grid-effects">
        <div class="effect-group">
            <label>JOASE (BASS) <span class="val" id="bV">0dB</span></label>
            <input type="range" id="bass" min="-20" max="20" value="0">
            <label>MEDII (MIDS) <span class="val" id="mV">0dB</span></label>
            <input type="range" id="mids" min="-20" max="20" value="0">
            <label>INALTE (TREBLE) <span class="val" id="hV">0dB</span></label>
            <input type="range" id="highs" min="-20" max="20" value="0">
        </div>

        <div class="effect-group">
            <label>REVERB (ECOU SALĂ) <span class="val" id="rV">0</span></label>
            <input type="range" id="reverb" min="0" max="1" step="0.1" value="0">
            <label>ECHO (DELAY) <span class="val" id="eV">0</span></label>
            <input type="range" id="echo" min="0" max="0.8" step="0.1" value="0">
            <label>MASTER FADER <span class="val" id="volV">1.0</span></label>
            <input type="range" id="volume" min="0" max="1.5" step="0.01" value="1.0">
        </div>

        <div class="effect-group">
            <label>PRESET VOCE ACTIV</label>
            <select id="preset">
                <option value="normal">🎵 Voce Normală</option>
                <option value="radio">🎙️ Radio FM Professional</option>
                <option value="megafon">📢 Megafon Șantier</option>
                <option value="telefon">📱 Voce Telefon</option>
                <option value="santier">👷 Inginer (Voce Groasă)</option>
                <option value="vader">👹 Efect Darth Vader</option>
            </select>
            <label>PITCH (GROSIME) <span class="val" id="pV">0</span></label>
            <input type="range" id="pitch" min="-12" max="12" value="0">
            <label>VITEZA <span class="val" id="sV">1.0x</span></label>
            <input type="range" id="speed" min="0.5" max="2" step="0.1" value="1">
        </div>
    </div>

    <div class="action-btns">
        <button id="playBtn" style="background:#ff8c00; color:black">▶ PLAY / STOP</button>
        <button onclick="detectSilence()" style="background:#6c63ff">⚡ DETECT CUES</button>
        <button onclick="saveCueFile()">💾 SAVE .CUE</button>
        <button onclick="exportZip()" style="background:#007bff">📦 EXPORT ZIP</button>
    </div>
    <div id="cueContainer" style="margin-top:15px; display:flex; flex-wrap:wrap; gap:5px;"></div>
</div>

<script>
let ctx, source, buffer, analyzer, gainNode, bNode, mNode, hNode, echoNode, feedbackNode;
let isPlaying = false, cuePoints = [], fileName = '';

// Update visual labels and real-time parameters
const ids = ['bass','mids','highs','reverb','echo','volume','pitch','speed'];
ids.forEach(id => {
    const el = document.getElementById(id);
    el.oninput = () => {
        document.getElementById(id + (id === 'volume' ? 'V' : (id === 'speed' ? 'V' : (id === 'pitch' ? 'V' : (id === 'reverb' ? 'V' : (id === 'echo' ? 'V' : 'V')))))).textContent = el.value;
        if(isPlaying) updateLiveParams();
    };
});

document.getElementById('audioUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    fileName = file.name;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    const ab = await file.arrayBuffer();
    buffer = await ctx.decodeAudioData(ab);
    drawWave();
};

function updateLiveParams() {
    if(!isPlaying) return;
    bNode.gain.value = parseFloat(document.getElementById('bass').value);
    mNode.gain.value = parseFloat(document.getElementById('mids').value);
    hNode.gain.value = parseFloat(document.getElementById('highs').value);
    gainNode.gain.value = parseFloat(document.getElementById('volume').value);
    
    const p = parseFloat(document.getElementById('pitch').value);
    const s = parseFloat(document.getElementById('speed').value);
    source.playbackRate.value = s * Math.pow(2, p / 12);
}

function play(startTime = 0) {
    if(isPlaying) { stop(); return; }
    if(!buffer) return;

    source = ctx.createBufferSource();
    source.buffer = buffer;

    // EQ
    bNode = ctx.createBiquadFilter(); bNode.type = "lowshelf"; bNode.frequency.value = 250;
    mNode = ctx.createBiquadFilter(); mNode.type = "peaking"; mNode.frequency.value = 1500;
    hNode = ctx.createBiquadFilter(); hNode.type = "highshelf"; hNode.frequency.value = 4000;

    // Echo (Delay)
    echoNode = ctx.createDelay();
    echoNode.delayTime.value = 0.3;
    feedbackNode = ctx.createGain();
    const echoAmt = parseFloat(document.getElementById('echo').value);
    feedbackNode.gain.value = echoAmt;

    gainNode = ctx.createGain();
    analyzer = ctx.createAnalyser();

    // Chain
    source.connect(bNode);
    bNode.connect(mNode);
    mNode.connect(hNode);
    hNode.connect(gainNode);

    if(echoAmt > 0) {
        gainNode.connect(echoNode);
        echoNode.connect(feedbackNode);
        feedbackNode.connect(echoNode);
        echoNode.connect(ctx.destination);
    }

    gainNode.connect(analyzer);
    analyzer.connect(ctx.destination);

    updateLiveParams();
    source.start(0, startTime);
    isPlaying = true;
    document.getElementById('playBtn').textContent = "⏹ STOP";
    drawVU();
}

function stop() {
    if(source) { source.stop(); source.disconnect(); }
    isPlaying = false;
    document.getElementById('playBtn').textContent = "▶ PLAY";
}

document.getElementById('playBtn').onclick = () => play(0);

// REPARARE PRESETURI: Acum forțează update-ul nodurilor
document.getElementById('preset').onchange = (e) => {
    const p = e.target.value;
    const s = (id, val) => {
        const el = document.getElementById(id);
        el.value = val;
        // Trimitem manual evenimentul de input pentru a actualiza textul si sunetul
        el.dispatchEvent(new Event('input'));
    };

    if(p === 'radio') { s('bass', 12); s('mids', 2); s('highs', 8); s('pitch', 0); }
    else if(p === 'megafon') { s('bass', -18); s('mids', 18); s('highs', 12); s('pitch', 2); }
    else if(p === 'telefon') { s('bass', -20); s('mids', 12); s('highs', -15); s('pitch', 1); }
    else if(p === 'santier') { s('bass', 10); s('mids', 0); s('highs', -5); s('pitch', -3); }
    else if(p === 'vader') { s('bass', 8); s('mids', 0); s('highs', 0); s('pitch', -7); }
    else { s('bass', 0); s('mids', 0); s('highs', 0); s('pitch', 0); }
};

function drawVU() {
    if(!isPlaying) return;
    const d = new Uint8Array(analyzer.frequencyBinCount);
    analyzer.getByteFrequencyData(d);
    let avg = d.reduce((a,b) => a+b, 0) / d.length;
    document.getElementById('vuFill').style.width = Math.min(100, avg * 2) + "%";
    requestAnimationFrame(drawVU);
}

function drawWave() {
    const canvas = document.getElementById('waveform');
    const ctxC = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    const data = buffer.getChannelData(0);
    const step = Math.ceil(data.length / canvas.width);
    ctxC.fillStyle = '#000'; ctxC.fillRect(0,0,canvas.width,60);
    ctxC.strokeStyle = '#ff8c00'; ctxC.beginPath();
    for(let i=0; i<canvas.width; i++) {
        let min=1, max=-1;
        for(let j=0; j<step; j++) {
            const v = data[i*step+j]; if(v<min) min=v; if(v>max) max=v;
        }
        ctxC.moveTo(i, (1+min)*30); ctxC.lineTo(i, (1+max)*30);
    }
    ctxC.stroke();
}

function detectSilence() {
    if(!buffer) return;
    const data = buffer.getChannelData(0), sr = buffer.sampleRate;
    cuePoints = [];
    for(let i=0; i<data.length; i+=sr/2) {
        if(Math.abs(data[i]) < 0.02 && cuePoints.length < 12) cuePoints.push(i/sr);
    }
    const container = document.getElementById('cueContainer');
    container.innerHTML = '';
    cuePoints.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.textContent = `CUE ${i+1} (${t.toFixed(1)}s)`;
        btn.onclick = () => { stop(); play(t); };
        container.appendChild(btn);
    });
}

function saveCueFile() {
    let txt = `FILE "${fileName}" MP3\n` + cuePoints.map((t,i)=>`  TRACK ${i+1} AUDIO\n    INDEX 01 ${Math.floor(t/60)}:${Math.floor(t%60)}:00`).join('\n');
    const b = new Blob([txt], {type:'text/plain'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='voiceover.cue'; a.click();
}
</script>
</body>
</html>
