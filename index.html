<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICE OVER MASTER PRO</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --accent-color: #ff8c00;
            --text-color: #e0e0e0;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .player-container {
            background: var(--panel-color);
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 950px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .header {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            font-weight: bold;
            color: var(--accent-color);
            font-size: 20px;
            text-align: center;
        }
        .drop-zone {
            border: 3px dashed var(--accent-color);
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            background: #222;
            cursor: pointer;
            margin-bottom: 15px;
        }
        .vu-meter {
            height: 20px;
            background: #000;
            width: 100%;
            margin: 10px 0;
            border-radius: 3px;
            overflow: hidden;
        }
        .vu-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #00ff00, #ffff00, #ff0000);
            transition: width 0.05s;
        }
        .grid-effects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .effect-group {
            background: #333;
            padding: 12px;
            border-radius: 5px;
            border: 1px solid #444;
        }
        label {
            display: block;
            font-size: 11px;
            color: var(--accent-color);
            font-weight: bold;
            margin-top: 8px;
        }
        .value-display { float: right; color: #00ff00; font-family: monospace; }
        input[type=range] {
            width: 100%;
            margin: 5px 0;
            accent-color: var(--accent-color);
            cursor: pointer;
        }
        select {
            width: 100%;
            background: #444; color: white; border: 1px solid #555;
            padding: 8px; border-radius: 3px; margin-top: 5px;
        }
        .cue-buttons-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 8px;
            max-height: 150px;
            overflow-y: auto;
            background: #000;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        .cue-btn {
            background: #444; color: white; border: 1px solid var(--accent-color);
            padding: 8px; cursor: pointer; border-radius: 4px; font-size: 11px;
        }
        .action-btns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
        }
        button {
            padding: 12px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer; color: white; background: #555;
        }
        button:hover { background: var(--accent-color); }
        canvas { width: 100%; height: 60px; background: #000; border-radius: 5px; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">🎙️ VOICE OVER MASTER PRO</div>
    
    <div class="drop-zone" onclick="document.getElementById('audioUpload').click()">
        <b>CLICK SAU DRAG AUDIO AICI</b>
        <input type="file" id="audioUpload" accept="audio/*" style="display:none">
    </div>

    <canvas id="waveform"></canvas>
    <div class="vu-meter"><div id="vuFill" class="vu-fill"></div></div>

    <div class="grid-effects">
        <div class="effect-group">
            <label>BASS (JOASE) <span class="value-display" id="bV">0dB</span></label>
            <input type="range" id="bass" min="-20" max="20" value="0">
            <label>MIDS (MEDII) <span class="value-display" id="mV">0dB</span></label>
            <input type="range" id="mids" min="-20" max="20" value="0">
            <label>TREBLE (INALTE) <span class="value-display" id="hV">0dB</span></label>
            <input type="range" id="highs" min="-20" max="20" value="0">
        </div>
        
        <div class="effect-group">
            <label>REVERB (SALA) <span class="value-display" id="rV">0%</span></label>
            <input type="range" id="reverb" min="0" max="1" step="0.1" value="0">
            <label>ECHO (DELAY) <span class="value-display" id="eV">0%</span></label>
            <input type="range" id="echo" min="0" max="0.8" step="0.05" value="0">
            <label>VOLUME <span class="value-display" id="volV">1.0</span></label>
            <input type="range" id="volume" min="0" max="1.5" step="0.01" value="1.0">
        </div>

        <div class="effect-group">
            <label>SPEED <span class="value-display" id="sV">1.0x</span></label>
            <input type="range" id="speed" min="0.5" max="2" step="0.05" value="1">
            <label>PITCH <span class="value-display" id="pV">0</span></label>
            <input type="range" id="pitch" min="-12" max="12" value="0">
            <label>PRESET VOCE</label>
            <select id="voicePreset">
                <option value="normal">🎵 Normal</option>
                <option value="radio">🎙️ Radio Podcast</option>
                <option value="megafon">📢 Megafon Șantier</option>
                <option value="telefon">📱 Voce Telefon</option>
                <option value="vader">👹 Darth Vader</option>
            </select>
        </div>
    </div>

    <div id="cueContainer" class="cue-buttons-container"></div>

    <div class="action-btns">
        <button onclick="detectSilence()" style="background:#6c63ff">⚡ Detect Cues</button>
        <button onclick="saveCueFile()" style="background:#2e7d32">💾 Save .CUE</button>
        <button onclick="exportZip()" style="background:#0277bd">📦 Export ZIP</button>
        <button id="playBtn" style="background:var(--accent-color); color:black">▶ PLAY / STOP</button>
    </div>
</div>

<script>
let audioCtx, source, buffer, analyzer, gainNode, bNode, mNode, hNode, reverbNode, echoNode, feedbackNode;
let isPlaying = false, cuePoints = [], fileName = '';

// Update valori slidere
const updateLabels = () => {
    document.getElementById('bV').textContent = document.getElementById('bass').value + 'dB';
    document.getElementById('mV').textContent = document.getElementById('mids').value + 'dB';
    document.getElementById('hV').textContent = document.getElementById('highs').value + 'dB';
    document.getElementById('rV').textContent = Math.round(document.getElementById('reverb').value * 100) + '%';
    document.getElementById('eV').textContent = Math.round(document.getElementById('echo').value * 100) + '%';
    document.getElementById('volV').textContent = document.getElementById('volume').value;
    document.getElementById('sV').textContent = document.getElementById('speed').value + 'x';
    document.getElementById('pV').textContent = document.getElementById('pitch').value;
    if(isPlaying) applyParams();
};

document.querySelectorAll('input[type=range]').forEach(i => i.oninput = updateLabels);

document.getElementById('audioUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    fileName = file.name;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ab = await file.arrayBuffer();
    buffer = await audioCtx.decodeAudioData(ab);
    drawWaveform();
};

function applyParams() {
    if(!isPlaying) return;
    bNode.gain.value = parseFloat(document.getElementById('bass').value);
    mNode.gain.value = parseFloat(document.getElementById('mids').value);
    hNode.gain.value = parseFloat(document.getElementById('highs').value);
    gainNode.gain.value = parseFloat(document.getElementById('volume').value);
    
    let s = parseFloat(document.getElementById('speed').value);
    let p = parseFloat(document.getElementById('pitch').value);
    source.playbackRate.value = s * Math.pow(2, p / 12);
}

function play(startOffset = 0) {
    if(isPlaying) { stop(); return; }
    if(!buffer) return;

    source = audioCtx.createBufferSource();
    source.buffer = buffer;

    // EQ Nodes
    bNode = audioCtx.createBiquadFilter(); bNode.type = "lowshelf"; bNode.frequency.value = 250;
    mNode = audioCtx.createBiquadFilter(); mNode.type = "peaking"; mNode.frequency.value = 1500;
    hNode = audioCtx.createBiquadFilter(); hNode.type = "highshelf"; hNode.frequency.value = 4000;

    // Echo/Delay
    echoNode = audioCtx.createDelay();
    echoNode.delayTime.value = 0.3;
    feedbackNode = audioCtx.createGain();
    feedbackNode.gain.value = parseFloat(document.getElementById('echo').value);

    // Reverb (Impulse Response Generator)
    reverbNode = audioCtx.createConvolver();
    const revVal = parseFloat(document.getElementById('reverb').value);
    if(revVal > 0) reverbNode.buffer = createImpulse(2, revVal);

    gainNode = audioCtx.createGain();
    analyzer = audioCtx.createAnalyser();

    // Chain
    source.connect(bNode);
    bNode.connect(mNode);
    mNode.connect(hNode);
    hNode.connect(gainNode);
    
    // Conectare Echo
    if(feedbackNode.gain.value > 0) {
        gainNode.connect(echoNode);
        echoNode.connect(feedbackNode);
        feedbackNode.connect(echoNode);
        echoNode.connect(audioCtx.destination);
    }
    
    // Conectare Reverb
    if(revVal > 0) {
        gainNode.connect(reverbNode);
        reverbNode.connect(audioCtx.destination);
    }

    gainNode.connect(analyzer);
    analyzer.connect(audioCtx.destination);

    applyParams();
    source.start(0, startOffset);
    isPlaying = true;
    document.getElementById('playBtn').textContent = "⏹ STOP";
    drawVU();
}

function stop() {
    if(source) { source.stop(); source.disconnect(); }
    isPlaying = false;
    document.getElementById('playBtn').textContent = "▶ PLAY";
}

document.getElementById('playBtn').onclick = () => play(0);

// Presets reparate
document.getElementById('voicePreset').onchange = (e) => {
    const p = e.target.value;
    const s = (id, v) => { document.getElementById(id).value = v; };
    
    if(p === 'radio') { s('bass', 10); s('mids', 2); s('highs', 5); s('pitch', 0); }
    else if(p === 'megafon') { s('bass', -15); s('mids', 15); s('highs', 8); s('pitch', 1); }
    else if(p === 'telefon') { s('bass', -20); s('mids', 10); s('highs', -10); s('pitch', 1); }
    else if(p === 'vader') { s('bass', 8); s('mids', 0); s('highs', 0); s('pitch', -6); }
    else { s('bass', 0); s('mids', 0); s('highs', 0); s('pitch', 0); }
    updateLabels();
};

function createImpulse(seconds, decay) {
    const len = audioCtx.sampleRate * seconds;
    const impulse = audioCtx.createBuffer(2, len, audioCtx.sampleRate);
    for(let c=0; c<2; c++) {
        const data = impulse.getChannelData(c);
        for(let i=0; i<len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, decay * 10);
    }
    return impulse;
}

function drawVU() {
    if(!isPlaying) return;
    const d = new Uint8Array(analyzer.frequencyBinCount);
    analyzer.getByteFrequencyData(d);
    let avg = d.reduce((a,b) => a+b, 0) / d.length;
    document.getElementById('vuFill').style.width = (avg * 1.5) + "%";
    requestAnimationFrame(drawVU);
}

function drawWaveform() {
    const canvas = document.getElementById('waveform');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    const data = buffer.getChannelData(0);
    const step = Math.ceil(data.length / canvas.width);
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,canvas.width, 60);
    ctx.strokeStyle = '#ff8c00'; ctx.beginPath();
    for(let i=0; i<canvas.width; i++) {
        let min=1, max=-1;
        for(let j=0; j<step; j++) {
            const v = data[i*step+j]; if(v<min) min=v; if(v>max) max=v;
        }
        ctx.moveTo(i, (1+min)*30); ctx.lineTo(i, (1+max)*30);
    }
    ctx.stroke();
}

function detectSilence() {
    if(!buffer) return;
    const data = buffer.getChannelData(0), sr = buffer.sampleRate;
    cuePoints = [];
    for(let i=0; i<data.length; i+=sr/2) {
        if(Math.abs(data[i]) < 0.02 && cuePoints.length < 15) cuePoints.push(i/sr);
    }
    const container = document.getElementById('cueContainer');
    container.innerHTML = '';
    cuePoints.forEach((t, i) => {
        const btn = document.createElement('button');
        btn.className = 'cue-btn';
        btn.textContent = `CUE ${i+1} (${t.toFixed(1)}s)`;
        btn.onclick = () => { stop(); play(t); };
        container.appendChild(btn);
    });
}

function saveCueFile() {
    let txt = `FILE "${fileName}" MP3\n` + cuePoints.map((t,i)=>`  TRACK ${i+1} AUDIO\n    INDEX 01 ${Math.floor(t/60).toString().padStart(2,'0')}:${Math.floor(t%60).toString().padStart(2,'0')}:00`).join('\n');
    const b = new Blob([txt], {type:'text/plain'});
    const a = document.createElement('a'); a.href=URL.createObjectURL(b); a.download='audio.cue'; a.click();
}

async function exportZip() {
    if(!buffer || cuePoints.length === 0) return;
    const zip = new JSZip();
    for(let i=0; i<cuePoints.length; i++) {
        const start = cuePoints[i], end = cuePoints[i+1] || buffer.duration;
        const len = Math.floor((end-start) * buffer.sampleRate);
        const seg = audioCtx.createBuffer(buffer.numberOfChannels, len, buffer.sampleRate);
        for(let ch=0; ch<buffer.numberOfChannels; ch++) seg.getChannelData(ch).set(buffer.getChannelData(ch).slice(start*buffer.sampleRate, end*buffer.sampleRate));
        zip.file(`track_${i+1}.wav`, audioBufferToWav(seg));
    }
    const content = await zip.generateAsync({type:"blob"});
    const a = document.createElement('a'); a.href=URL.createObjectURL(content); a.download='tracks.zip'; a.click();
}

function audioBufferToWav(buf) {
    const len = buf.length * buf.numberOfChannels * 2, wav = new ArrayBuffer(44 + len), view = new DataView(wav);
    const s = (o, str) => { for(let i=0;i<str.length;i++) view.setUint8(o+i, str.charCodeAt(i)); };
    s(0, 'RIFF'); view.setUint32(4, 36+len, true); s(8, 'WAVE'); s(12, 'fmt ');
    view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, buf.numberOfChannels, true);
    view.setUint32(24, buf.sampleRate, true); view.setUint32(28, buf.sampleRate * buf.numberOfChannels * 2, true);
    view.setUint16(32, buf.numberOfChannels * 2, true); view.setUint16(34, 16, true); s(36, 'data'); view.setUint32(40, len, true);
    let offset = 44;
    for(let i=0; i<buf.length; i++) {
        for(let ch=0; ch<buf.numberOfChannels; ch++) {
            const v = Math.max(-1, Math.min(1, buf.getChannelData(ch)[i]));
            view.setInt16(offset, v < 0 ? v * 0x8000 : v * 0x7FFF, true); offset += 2;
        }
    }
    return wav;
}
</script>
</body>
</html>
