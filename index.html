<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceOver Pro - Construcții Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #121212;
            --panel-color: #1e1e1e;
            --accent-color: #ffcc00; /* Galben de construcții */
            --text-color: #ffffff;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: 'Segoe UI', sans-serif; padding: 20px; display: flex; justify-content: center; }
        .player-container { background: var(--panel-color); border: 2px solid #333; border-radius: 12px; padding: 25px; width: 100%; max-width: 950px; box-shadow: 0 15px 35px rgba(0,0,0,0.7); }
        .header { border-bottom: 3px solid var(--accent-color); padding-bottom: 15px; margin-bottom: 20px; text-align: center; }
        .header h1 { font-size: 24px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 2px; }
        
        /* TTS Section */
        .tts-section { background: #2a2a2a; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 5px solid #007bff; }
        textarea { width: 100%; height: 80px; background: #333; color: white; border: 1px solid #444; padding: 10px; border-radius: 5px; resize: none; margin-bottom: 10px; }
        
        /* Grid */
        .grid-effects { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin: 20px 0; }
        .effect-group { background: #252525; padding: 15px; border-radius: 8px; border: 1px solid #333; }
        label { display: block; font-size: 12px; color: var(--accent-color); font-weight: bold; margin-top: 10px; }
        .value-display { float: right; color: #00ff00; font-family: monospace; }

        /* Controls */
        input[type=range] { width: 100%; cursor: pointer; accent-color: var(--accent-color); }
        select { width: 100%; background: #333; color: white; border: 1px solid #555; padding: 8px; border-radius: 5px; margin-top: 5px; }
        
        .action-btns { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin-top: 25px; }
        button { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; text-transform: uppercase; }
        .btn-gen { background: #007bff; color: white; }
        .btn-play { background: var(--accent-color); color: black; }
        .btn-save { background: #28a745; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }

        /* VU & Wave */
        canvas { width: 100%; height: 100px; background: #000; border-radius: 5px; margin-bottom: 10px; }
        .comp-active { color: #00ff00; font-size: 10px; text-align: center; }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">
        <h1>🏗️ VoiceOver Pro - Construction Master</h1>
    </div>

    <div class="tts-section">
        <label>DESCRIERE PROIECT (TEXT TO AUDIO)</label>
        <textarea id="ttsInput" placeholder="Ex: Bine ați venit pe șantierul nostru. Siguranța este prioritatea numărul unu..."></textarea>
        <button class="btn-gen" onclick="generateTTS()">🎙️ Generare Voce AI</button>
    </div>

    <canvas id="waveform"></canvas>
    
    <div class="grid-effects">
        <div class="effect-group">
            <label>MASTER FADER (VOLUME) <span class="value-display" id="volVal">80%</span></label>
            <input type="range" id="volume" min="0" max="1.5" step="0.05" value="0.8">
            
            <label>COMPRESIE (PUNCH) <span class="value-display" id="compVal">Activ</span></label>
            <input type="range" id="compressorRatio" min="1" max="20" step="1" value="4">
            <div class="comp-active">Compresia previne distorsiunea (Clipping)</div>
        </div>

        <div class="effect-group">
            <label>SPEED & PITCH</label>
            <select id="voicePreset">
                <option value="1|0">👔 Standard Corporate</option>
                <option value="0.9|-2">👷 Șantier (Gros/Serios)</option>
                <option value="1.1|2">📢 Anunț Public (Clar/Rapid)</option>
                <option value="0.85|-1">📻 Radio Podcast</option>
                <option value="0.75|-4">👹 Darth Vader Style</option>
                <option value="1.5|5">🐹 Minion / Funny</option>
            </select>
            
            <label>BASS BOOST <span class="value-display" id="bassVal">0 dB</span></label>
            <input type="range" id="bass" min="0" max="15" step="1" value="0">
        </div>

        <div class="effect-group">
            <label>REVERB (SPAȚIU) <span class="value-display" id="revVal">0%</span></label>
            <input type="range" id="reverb" min="0" max="0.8" step="0.05" value="0">
            <label>ECHO <span class="value-display" id="echoVal">0%</span></label>
            <input type="range" id="echo" min="0" max="0.5" step="0.05" value="0">
        </div>
    </div>

    <div class="action-btns">
        <button class="btn-play" id="playBtn">▶ Play / Stop</button>
        <button class="btn-save" onclick="exportProcessedAudio()">💾 Salvează Audio Refăcut</button>
    </div>
</div>

<script>

    // --- GENERARE TTS (Text To Speech) ---
    function generateTTS() {
        const text = document.getElementById('ttsInput').value;
        if (!text) return alert("Introdu un text mai întâi!");

        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ro-RO';
        utterance.rate = 0.9; // Puțin mai rar pentru claritate profesională
        
        // În loc să-l punem direct în boxe, folosim sinteza browserului
        window.speechSynthesis.speak(utterance);
    }

        const [speed, pitch] = e.target.value.split('|');

    // Update displays
    document.getElementById('volume').oninput = (e) => {
        document.getElementById('volVal').textContent = Math.round(e.target.value * 100) + '%';
    };
    document.getElementById('bass').oninput = (e) => {
        document.getElementById('bassVal').textContent = e.target.value + ' dB';
    };
</script>

</body>
</html>
