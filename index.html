<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIMP Web-Master Cue Player</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2d2d2d;
            --accent-color: #ff8c00;
            --text-color: #e0e0e0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .player-container {
            background: var(--panel-color);
            border: 2px solid #444;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 900px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .header span {
            font-weight: bold;
            color: var(--accent-color);
            font-size: 20px;
        }

        /* Drag & Drop Zone */
        .drop-zone {
            border: 3px dashed var(--accent-color);
            padding: 30px;
            text-align: center;
            border-radius: 8px;
            background: #222;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .drop-zone:hover,
        .drop-zone.drag-over {
            background: #333;
            border-color: #ffa500;
        }

        .drop-zone input[type=file] {
            display: none;
        }

        /* VU Meter */
        .vu-meter {
            height: 25px;
            background: #000;
            width: 100%;
            margin: 15px 0;
            position: relative;
            border-radius: 3px;
            overflow: hidden;
        }

        .vu-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(to right, #00ff00, #ffff00, #ff0000);
            transition: width 0.05s;
        }

        /* Slidere */
        input[type=range] {
            height: 12px;
            -webkit-appearance: none;
            background: #444;
            border-radius: 5px;
            width: 100%;
            margin: 8px 0;
        }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 24px;
            background: var(--accent-color);
            cursor: pointer;
            border-radius: 3px;
            box-shadow: 0 0 5px #000;
        }

        .grid-effects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }

        .effect-group {
            background: #333;
            padding: 15px;
            border-radius: 5px;
            border: 1px solid #444;
        }

        .effect-group label {
            display: block;
            font-size: 11px;
            color: var(--accent-color);
            font-weight: bold;
            margin-top: 10px;
        }

        .value-display {
            float: right;
            color: #aaa;
            font-size: 10px;
        }

        select {
            width: 100%;
            margin-top: 5px;
            background: #444;
            color: white;
            border: 1px solid #555;
            padding: 8px;
            border-radius: 3px;
            cursor: pointer;
        }

        /* Cue Buttons */
        .cue-buttons-container {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
            background: #000;
            padding: 15px;
            border-radius: 5px;
        }

        .cue-btn {
            background: linear-gradient(135deg, #444 0%, #333 100%);
            color: white;
            border: 2px solid var(--accent-color);
            padding: 15px 10px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.2s;
            text-align: center;
        }

        .cue-btn:hover {
            background: linear-gradient(135deg, #555 0%, #444 100%);
            transform: translateY(-2px);
        }

        .cue-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* Action Buttons */
        .action-btns {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        button {
            background: #555;
            color: white;
            border: none;
            padding: 12px;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 11px;
            font-weight: bold;
            border-radius: 5px;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--accent-color);
        }

        .btn-detect { background: #6c63ff; }
        .btn-save { background: #2e7d32; }
        .btn-export { background: #0277bd; }
        .btn-play { background: var(--accent-color); color: #000; }

        .status-message {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            border-left: 3px solid var(--accent-color);
            font-size: 12px;
            display: none;
        }

        .status-message.show { display: block; }

        canvas {
            width: 100%;
            height: 80px;
            background: #000;
            border-radius: 5px;
            margin: 15px 0;
        }
    </style>
</head>
<body>

<div class="player-container">
    <div class="header">
        <span>🎵 AIMP WEB MASTER AI</span>
    </div>

    <div class="drop-zone" id="dropZone">
        <div style="font-size: 40px; margin-bottom: 10px;">🎵</div>
        <div style="font-size: 16px; font-weight: bold;">DRAG & DROP AUDIO AICI</div>
        <div style="font-size: 12px; color: #888; margin-top: 5px;">sau click pentru a selecta (MP3, WAV, OGG)</div>
        <input type="file" id="audioUpload" accept="audio/*">
    </div>

    <div class="status-message" id="statusMsg"></div>
    <canvas id="waveform"></canvas>
    <div class="vu-meter"><div id="vuFill" class="vu-fill"></div></div>

    <div class="grid-effects">
        <div class="effect-group">
            <label>ECHO <span class="value-display" id="echoVal">0%</span></label>
            <input type="range" id="echo" min="0" max="0.8" step="0.05" value="0">
            
            <label>REVERB <span class="value-display" id="reverbVal">0%</span></label>
            <input type="range" id="reverb" min="0" max="0.8" step="0.05" value="0">
            
            <label>FLANGER <span class="value-display" id="flangerVal">0%</span></label>
            <input type="range" id="flanger" min="0" max="10" step="0.5" value="0">
        </div>

        <div class="effect-group">
            <label>SPEED <span class="value-display" id="speedVal">1.0x</span></label>
            <input type="range" id="speed" min="0.5" max="2" step="0.05" value="1">
            
            <label>PITCH <span class="value-display" id="pitchVal">0</span></label>
            <input type="range" id="pitch" min="-12" max="12" step="1" value="0">
            
            <label>VOLUME <span class="value-display" id="volVal">80%</span></label>
            <input type="range" id="volume" min="0" max="1" step="0.05" value="0.8">
        </div>

        <div class="effect-group">
            <label>BASS BOOST <span class="value-display" id="bassVal">0 dB</span></label>
            <input type="range" id="bass" min="0" max="20" step="1" value="0">
            
            <label>VOICE CHANGER</label>
            <select id="voicePreset">
                <option value="1">🎵 Normal</option>
                <option value="0.7">👹 Darth Vader</option>
                <option value="1.5">🐹 Minion</option>
                <option value="1.2">📻 Radio MC</option>
                <option value="0.5">👾 Monster</option>
                <option value="0.85">🎙️ Podcast</option>
            </select>
        </div>
    </div>

    <div id="cueContainer" class="cue-buttons-container">
        <p style="font-size: 11px; color: #888; text-align: center; grid-column: 1/-1;">
            Apasă "DETECT CUES" pentru detectie automată silence (200ms)
        </p>
    </div>

    <div class="action-btns">
        <button class="btn-detect" onclick="detectSilence()">⚡ Detect Cues</button>
        <button class="btn-save" onclick="saveCueFile()">💾 Save .CUE</button>
        <button class="btn-export" onclick="exportZip()">📦 Export ZIP</button>
        <button class="btn-play" id="playBtn">▶ Play / Pause</button>
    </div>
</div>

<script>
    let audioCtx, source, buffer, analyzer, gainNode;
    let cuePoints = [];
    let isPlaying = false;
    let currentTime = 0;
    let fileName = '';

    // Actualizare etichete slidere
    const sliders = {
        echo: 'echoVal', reverb: 'reverbVal', flanger: 'flangerVal',
        speed: 'speedVal', pitch: 'pitchVal', volume: 'volVal', bass: 'bassVal'
    };

    Object.keys(sliders).forEach(id => {
        const slider = document.getElementById(id);
        const display = document.getElementById(sliders[id]);
        slider.oninput = () => {
            let val = parseFloat(slider.value);
            if (id === 'echo' || id === 'reverb') display.textContent = Math.round(val * 100) + '%';
            else if (id === 'speed') display.textContent = val.toFixed(2) + 'x';
            else if (id === 'volume') display.textContent = Math.round(val * 100) + '%';
            else if (id === 'bass') display.textContent = val + ' dB';
            else if (id === 'pitch') display.textContent = val > 0 ? '+' + val : val;
            else if (id === 'flanger') display.textContent = val.toFixed(1);
        };
    });

    function showStatus(msg, loading = false) {
        const status = document.getElementById('statusMsg');
        status.className = 'status-message show';
        status.innerHTML = msg + (loading ? ' <span class="loading"></span>' : '');
        if (!loading) setTimeout(() => status.className = 'status-message', 5000);
    }

    // Gestionare Fișiere
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('audioUpload');

    dropZone.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) loadAudio(file);
    };

    dropZone.ondragover = (e) => { e.preventDefault(); dropZone.classList.add('drag-over'); };
    dropZone.ondragleave = () => dropZone.classList.remove('drag-over');
    dropZone.ondrop = (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('audio/')) loadAudio(file);
    };

    async function loadAudio(file) {
        showStatus('📂 Se încarcă: ' + file.name, true);
        fileName = file.name;
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const arrayBuffer = await file.arrayBuffer();
            buffer = await audioCtx.decodeAudioData(arrayBuffer);
            showStatus(`✅ Audio încărcat!`);
            drawWaveform();
        } catch (err) {
            showStatus('❌ Eroare la decodare: ' + err.message);
        }
    }

    function drawWaveform() {
        const canvas = document.getElementById('waveform');
        const ctx = canvas.getContext('2d');
        canvas.width = canvas.offsetWidth;
        const data = buffer.getChannelData(0);
        const step = Math.ceil(data.length / canvas.width);
        const amp = 40; 

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#ff8c00';
        ctx.beginPath();
        for (let i = 0; i < canvas.width; i++) {
            let min = 1, max = -1;
            for (let j = 0; j < step; j++) {
                const datum = data[(i * step) + j];
                if (datum < min) min = datum;
                if (datum > max) max = datum;
            }
            ctx.moveTo(i, (1 + min) * amp);
            ctx.lineTo(i, (1 + max) * amp);
        }
        ctx.stroke();
    }

    function playFrom(time) {
        if (source) source.stop();
        if (!buffer) return;

        source = audioCtx.createBufferSource();
        source.buffer = buffer;
        
        // Effects
        gainNode = audioCtx.createGain();
        gainNode.gain.value = parseFloat(document.getElementById('volume').value);
        
        analyzer = audioCtx.createAnalyser();
        
        source.connect(gainNode);
        gainNode.connect(analyzer);
        analyzer.connect(audioCtx.destination);
        
        source.start(0, time);
        isPlaying = true;
        updateVU();
    }

    function updateVU() {
        if (!isPlaying || !analyzer) return;
        const dataArray = new Uint8Array(analyzer.frequencyBinCount);
        analyzer.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        let avg = sum / dataArray.length;
        document.getElementById('vuFill').style.width = (avg / 255 * 100) + '%';
        requestAnimationFrame(updateVU);
    }

    document.getElementById('playBtn').onclick = () => {
        if (isPlaying) {
            source.stop();
            isPlaying = false;
        } else {
            playFrom(0);
        }
    };

    function detectSilence() {
        if (!buffer) return showStatus('❌ Încarcă audio!');
        showStatus('🔍 Detectez...', true);
        
        const data = buffer.getChannelData(0);
        const step = 441; 
        cuePoints = [];
        
        for (let i = 0; i < data.length; i += step) {
            if (Math.abs(data[i]) < 0.02 && cuePoints.length < 12) {
                let time = i / buffer.sampleRate;
                if (cuePoints.length === 0 || time - cuePoints[cuePoints.length-1] > 2) {
                    cuePoints.push(time);
                }
            }
        }
        renderCues();
        showStatus(`✅ Gata!`);
    }

    function renderCues() {
        const container = document.getElementById('cueContainer');
        container.innerHTML = '';
        cuePoints.forEach((t, i) => {
            const btn = document.createElement('button');
            btn.className = 'cue-btn';
            btn.innerHTML = `CUE ${i+1}<br><small>${t.toFixed(1)}s</small>`;
            btn.onclick = () => playFrom(t);
            container.appendChild(btn);
        });
    }

    // Funcțiile de salvare rămân neschimbate...
    function saveCueFile() { /* cod existent */ }
    function exportZip() { /* cod existent */ }
</script>
</body>
</html>
